<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="info_window/info.css">

    <link rel="stylesheet" href="ui/ui.css">
    <link rel="stylesheet" href="ball/ball.css">
    <link rel="stylesheet" href="control_window/control.css">

</head>

<body data-theme = "white">

    <main class="main-container">
        <section data-grid=5 class="ui">
            <div class="tail" style="position: absolute;"></div>
            <div class="coor-line z-line"></div>
            <div class="coor-line y-line"></div>
            <div class="coor-line x-line"></div>
            
        </section>
        
        <section class="balls">
            <div class="ball" data-id = "0"></div>

            <div class="shadow-ball" data-id="0">
                <div class="angle-line"> </div>
            </div>
        </section>
    </main>

    <section class="windows">

        <!-- diagram information -->
        <div class="info" style="margin-bottom: 50px;">
            <h1>info:</h1>
            <p class="ball-info"></p>
            <p class="balls-quantity-info">Quantity of balls: 1</p>
        </div>

        <!-- control panel -->
        <div class="control">
            <h1> Control panel: 
        <button type = "button" style="padding: 1rem; place-self: center" class = "switch-theme">switch theme</button>

            </h1>


            <div class="coordinate-inputs" style="display: flex; flex-direction: column; gap: 0.1rem; margin-bottom: 2rem;">

                <div class=" input-container">
                    <p>start x: </p>
                    <input type="number" name="x" class="x-input" placeholder="x0: ">
                </div>

                <div class=" input-container">
                    <p>start y: </p>
                    <input type="number" name="y"  class="y-input" placeholder="y0: ">
                </div>
            </div>

              <div class=" input-container">
                    <p>direction angle: </p>
                    <input type="number" name="angle-input" class="angle-input" placeholder="default: 45 ">
                </div>

                <div>
                    <div class="input-container">
                        <p>speed (px/second): </p>
                        <input type="number" name="speed-input" class="speed-input" placeholder="default: 250">
                    </div>
                        <div class=" input-container">
                            <p>speed acceleration: </p>
                            <input type="number" name="speed-acceleration-input" class="speed-acceleration-input" placeholder="default: 2 ">
                        </div>
                </div>

              <div class="input-container">
                <p>gravity:</p>
                <input type="number" name="gravity-input" class="gravity-input" placeholder="default: 9.8">
              </div>
             
            <h1 style="margin-top: 3rem;"> Simulations: 
                <button type="button" class="reset-ball" style="aspect-ratio: 1/.5;">Reset ball</button>
            </h1>
            <div class="simulations" style="display: flex; flex-direction: column;">
                <button type="button" class="uniform_rectilinear"> run uniform rectilinear</button>
                <button type="button" class="uniformy_accelerated_rectilinear"> run uniformly accelerated rectilinear</button>
                <button type="button" class="parabolic_motion">run parabolic motion</button>
            </div>
        </div>
    </section>
              <div class="multi-control info">
                <h1>Multi ball control: </h1>
                <div class="" style="margin-top: 1rem;">

                <button type="button" class="create-ball-button" style = "padding: 1rem;">Create ball</button>
                <button type="button" class="init-balls-button" style = "padding: 1rem;">Set balls in init pos</button>
                    </div>
                <div class="" style="margin-top: 1rem;">
                    <button type = "button" class="start-all-button" style = "padding: 1rem;">Run all balls!</button>
                    <button type = "button" class="stop-all-button" style = "padding: 1rem;">Stop all balls!</button>
                </div>
                
                <div class="" style="margin-top: 1rem;">
                    <button type="button" class="delete-active-ball-button" style = "padding: 1rem;">Delete active ball</button>
                    <button type="button" class="delete-all-balls-button" style = "padding: 1rem;">Delete all balls</button>
                </div>
                <div style="display:flex; flex-direction: column; gap: 0.1rem; margin-bottom: 2rem;">
                      <div class=" input-container" style="padding: .5rem; margin-top: 1rem; border: 3px solid black">
                    <p>direction angle: </p>
                    <input type="number" name="angle-input" class="angle-input" placeholder="default: 45 ">
                    <button type="button" class="random-angle-button" style = "padding: 1rem;">Random angle for all</button>

                </div> 
                <div class="input-container" style="margin-top: 1rem;">
                    <p>speed (px/second): </p>
                    <input type="number" name="speed-input" class="speed-input" placeholder="default: 250">
                </div>
                <div class="input-container">
                    <p>gravity:</p>
                    <input type="number" name="gravity-input" class="gravity-input" placeholder="default: 9.8">
                </div>
                </div>
            </div>

    <script type="module" src="control_window/control.js"></script>

    <!-- info -->
    <script type="module" src="info_window/info.js"></script>

    <!-- managing multiple objects  -->
    <script type="module" src="control_window/multi-control.js"></script>


    <!-- control -->
    <script type="module" src="control_window/create_ball.js"></script>
    
    <!-- ball phys units funcs -->
    <script type="module" src="ball/modules/update_speed.js"></script>
    <script type="module" src="main/loop.js"></script>
    <script type="module" src="ball/drag_n_drop.js"> </script>
    
    <!-- ui -->
    <script type="module" src="ui/ui.js"></script>

    <!-- <script type="module" src="ui/tail.js"></script> -->

</body>
</html>
