<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="info_window/info.css">

    <link rel="stylesheet" href="ui/ui.css">
    <link rel="stylesheet" href="ball/ball.css">
    <link rel="stylesheet" href="control_window/control.css">


</head>
<body>

    <main class = "main-container">
        <section data-grid = 15 class="ui"></section>

        <div class = "ball" > </div>
        <div class = "shadow-ball" > </div>

    </main>
    
    <script src="ui/ui.js"></script>



    <section class="windows">

        <!-- diagram information -->
        <div class="info" style="margin-bottom: 50px;">
            <h1>info:</h1> 
            <p class="ball-info"></p>
        </div>
    
    
    <!-- control panel -->
        <div class="control">
            <h1> Control panel: </h1> 

            <div class="coordinate-inputs" style="display: flex; flex-direction: column; gap: 0.5rem">

                <input type="number" name = "x" placeholder="x0: ">
                    <input  type ="number" name = "y" placeholder="y0: ">
            </div>

            <h1> Simulations: </h1>
            <div class="simulations" style="display: flex; flex-direction: column;">
                <button type = "button" class = "uniform_rectilinear"> run uniform rectilinear</button>
                <button type = "button" class = "uniformy_accelerated_rectilinear"> uniformly accelerated rectilinear </button>
            </div>
            </div>
    </section>
 

    <!-- info -->
    <script type = "module" src="info_window/info.js"></script>

    <!-- control -->
    <script type = "module" src="control_window/control.js"></script>

    <!-- ball phys units funcs -->
    <script type = "module" src="ball/modules/update_speed.js"></script>
    <script type = "module" src="ball/modules/update_position.js"></script>
    <script type = "module" src="ball/ball.js"></script>

</body>
</html>
