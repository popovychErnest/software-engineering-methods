<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="info_window/info.css">

    <link rel="stylesheet" href="ui/ui.css">
    <link rel="stylesheet" href="ball/ball.css">
    <link rel="stylesheet" href="control_window/control.css">

</head>

<body>

    <main class="main-container">
        <section data-grid=15 class="ui"></section>

        <div class="ball"> </div>
        <div class="shadow-ball">
            <div class="angle-line"> </div>
        </div>
    </main>

    <section class="windows">

        <!-- diagram information -->
        <div class="info" style="margin-bottom: 50px;">
            <h1>info:</h1>
            <p class="ball-info"></p>
        </div>

        <!-- control panel -->
        <div class="control">
            <h1> Control panel: </h1>

            <div class="coordinate-inputs" style="display: flex; flex-direction: column; gap: 0.1rem; margin-bottom: 2rem;">

                <div class=" input-container">
                    <p>start x: </p>
                    <input type="number" name="x" class="x-input" placeholder="x0: ">
                </div>

                <div class=" input-container">
                    <p>start y: </p>
                    <input type="number" name="y" class="y-input" placeholder="y0: ">
                </div>
            </div>

              <div class=" input-container">
                    <p>direction angle: </p>
                    <input type="number" name="angle-input" class="angle-input" placeholder="default: 0 ">
                </div>

                <div>

                    <div class="input-container">
                        <p>speed (px/second): </p>
                        <input type="number" name="speed-input" class="speed-input" placeholder="default: 25">
                    </div>
                        <div class=" input-container">
                            <p>speed acceleration: </p>
                            <input type="number" name="speed-acceleration-input" class="speed-acceleration-input" placeholder="default: 1.1 ">
                        </div>
                </div>

                          
            <h1> Simulations: </h1>
            <div class="simulations" style="display: flex; flex-direction: column;">
                <button type="button" class="uniform_rectilinear"> run uniform rectilinear</button>
                <button type="button" class="uniformy_accelerated_rectilinear"> uniformly accelerated rectilinear</button>
            </div>
        </div>
    </section>

    <script type="module" src="control_window/control.js"></script>


    <!-- info -->
    <script type="module" src="info_window/info.js"></script>

    <!-- control -->

    <!-- ball phys units funcs -->
    <script type="module" src="ball/modules/update_speed.js"></script>
    <script type="module" src="ball/ball.js"></script>
    <script src="ui/ui.js"></script>

</body>

</html>
